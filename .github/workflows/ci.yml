name: CI

on:
  push:
  pull_request:

# Cancel a branch/PR's in-flight run when a newer commit is pushed, so queued
# runners aren't spent on superseded commits. Keyed on the ref, so pushes to
# different branches (and tags) never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Action-pinning policy: third-party actions are pinned to a full commit SHA
# with the human-readable tag in a trailing comment; Dependabot's github-actions
# updater bumps both. dtolnay/rust-toolchain is the deliberate exception — it is
# pinned to a channel ref (`@stable` / `@master`) because that ref is precisely
# how the action selects the Rust toolchain, and a branch SHA-pin could not be
# kept current by Dependabot.

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      activemq:
        image: apache/activemq-classic:latest
        ports:
          - 5672:5672
      rabbitmq:
        image: rabbitmq:3-management
        # A non-`guest` user: RabbitMQ restricts `guest` to loopback, and the
        # runner reaches the service container over its network, not loopback.
        env:
          RABBITMQ_DEFAULT_USER: keyhole
          RABBITMQ_DEFAULT_PASS: keyhole
        ports:
          - 5673:5672
        # Gate on the keyhole user authenticating, not just `ping`: the node
        # answers ping before the default user is provisioned, so the job could
        # otherwise start the tests while a connect still hits ACCESS_REFUSED.
        options: >-
          --health-cmd "rabbitmqctl -q authenticate_user keyhole keyhole"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 20s
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --locked

      - name: Install redis-cli
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Enable keyspace notifications
        # The keyspace-monitor integration test needs server-side notifications.
        run: redis-cli -h 127.0.0.1 -p 6379 config set notify-keyspace-events KEA

      - name: Wait for ActiveMQ
        # ActiveMQ boots slowly; wait for its AMQP port before integration tests.
        run: |
          for _ in $(seq 1 60); do
            (echo > /dev/tcp/127.0.0.1/5672) 2>/dev/null && exit 0
            sleep 2
          done
          echo "ActiveMQ did not become ready" >&2; exit 1

      - name: Integration tests
        env:
          KEYHOLE_TEST_REDIS_PORT: "6379"
          KEYHOLE_TEST_AMQP_PORT: "5672"
          KEYHOLE_TEST_RABBITMQ_PORT: "5673"
        run: cargo test --locked --features integration -- --include-ignored

  # Guard the release plumbing (installer script + workflows) on every push,
  # so breakage is caught here rather than when a real `vX.Y.Z` tag is pushed.
  release-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Installer test suite
        # Target detection + full download/verify/install flow (no network).
        run: ./scripts/test_install.sh

      - name: Packaging artifact tests
        # AUR PKGBUILDs/.SRCINFO + Homebrew formula + Nix flake: structure,
        # version consistency, .SRCINFO sync, and the release generator round-trip
        # (makepkg/brew/nix validators are skipped here, exercised in the nix job).
        run: ./scripts/test_packaging.sh

      - name: ShellCheck the install + packaging scripts
        # shellcheck is preinstalled on GitHub's ubuntu-latest runners.
        run: shellcheck scripts/install.sh scripts/test_install.sh scripts/gen_packaging.sh scripts/test_packaging.sh scripts/lib/srcinfo.sh scripts/record_demo.sh

      # Install actionlint from a pinned release rather than piping a script off
      # the action's `main` branch (a mutable, unpinned supply-chain input).
      # taiki-e/install-action no longer bundles an actionlint manifest, so fetch
      # the release tarball directly and verify its published SHA-256 checksum.
      - name: Install actionlint
        run: |
          set -euo pipefail
          version=1.7.7
          sha256=023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
          tarball="actionlint_${version}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${version}/${tarball}"
          curl -fsSL -o "${RUNNER_TEMP}/${tarball}" "${url}"
          echo "${sha256}  ${RUNNER_TEMP}/${tarball}" | sha256sum -c -
          tar -C "${RUNNER_TEMP}" -xzf "${RUNNER_TEMP}/${tarball}" actionlint
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: actionlint (workflow lint)
        run: actionlint -color

  # Keep the crates.io publish (Tier 1a) green: a from-scratch package + build
  # of exactly what `cargo publish` would upload.
  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo publish --dry-run
        run: cargo publish --dry-run --locked

  # Supply-chain gate: RUSTSEC advisories, license policy, banned/duplicate
  # crates, and crate sources. Policy lives in deny.toml; the action ships a
  # prebuilt cargo-deny, so no Rust toolchain is needed here. A daily scheduled
  # advisory-only scan also runs in .github/workflows/audit.yml.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check

  # Prove the crate still builds on its declared minimum supported Rust version.
  # Every other job runs on stable, so without this the `rust-version` in
  # Cargo.toml is an unverified claim that would drift as new language/std/dep
  # features creep in. The version is read straight from Cargo.toml so it stays
  # the single source of truth — bump it there and this job follows.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(grep -m1 -E '^rust-version' Cargo.toml | sed -E 's/.*"([0-9]+(\.[0-9]+)*)".*/\1/')
          [ -n "$version" ] || { echo "could not parse rust-version from Cargo.toml" >&2; exit 1; }
          echo "Declared MSRV: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo check (full feature set, on MSRV)
        run: cargo check --locked --all-features

  # Measure line coverage across the FULL surface, including the broker-backed
  # integration tests so the live connection code in src/broker/* is counted,
  # then fail if it regresses below the floor. The broker services + readiness
  # waits mirror the `build` job. CLAUDE.md mandates the codebase stays
  # adequately covered; this job is what enforces it.
  #
  # The floor is 90%; the observed integration-inclusive line coverage is ~92%
  # (326 tests). Ratchet it upward toward the observed number as coverage
  # improves — never lower it (see CONTRIBUTING.md). cargo-llvm-cov needs the
  # llvm-tools-preview component.
  coverage:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      activemq:
        image: apache/activemq-classic:latest
        ports:
          - 5672:5672
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: keyhole
          RABBITMQ_DEFAULT_PASS: keyhole
        ports:
          - 5673:5672
        options: >-
          --health-cmd "rabbitmqctl -q authenticate_user keyhole keyhole"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 20s
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-llvm-cov

      - name: Install redis-cli
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Enable keyspace notifications
        run: redis-cli -h 127.0.0.1 -p 6379 config set notify-keyspace-events KEA

      - name: Wait for ActiveMQ
        run: |
          for _ in $(seq 1 60); do
            (echo > /dev/tcp/127.0.0.1/5672) 2>/dev/null && exit 0
            sleep 2
          done
          echo "ActiveMQ did not become ready" >&2; exit 1

      - name: Collect coverage (unit + snapshot + integration)
        env:
          KEYHOLE_TEST_REDIS_PORT: "6379"
          KEYHOLE_TEST_AMQP_PORT: "5672"
          KEYHOLE_TEST_RABBITMQ_PORT: "5673"
        run: cargo llvm-cov --no-report --locked --all-features -- --include-ignored

      - name: Report coverage + enforce floor
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          summary=$(cargo llvm-cov report --summary-only)
          {
            echo '### Coverage'
            echo '```'
            echo "$summary"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$summary"
          # Gate: fail the job if line coverage drops below the floor.
          cargo llvm-cov report --summary-only --fail-under-lines 90 >/dev/null

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error

  # Validate the Nix flake (Tier 2c): evaluate it, build the default package, and
  # smoke-run the result. This is the only automated proof that
  # `nix run github:AlexKasapis/Keyhole` works — the structural flake checks live
  # in release-lint. It compiles the full glibc feature set under Nix, so it is
  # heavier than the other jobs and stands on its own.
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake evaluates (schema + outputs)
        run: nix flake check --no-build

      - name: Build the default package
        run: nix build .#default -L

      - name: Smoke-run the built binary
        run: |
          ./result/bin/keyhole --version
          ./result/bin/keyhole --help

  # Tier 3 — build the distro-native packages from Cargo.toml's packaging metadata
  # and prove they install and run. Mirrors the `nix` job: the only automated
  # end-to-end check that `apt install ./keyhole.deb` and `dnf install ./keyhole.rpm`
  # work (the structural metadata checks live in release-lint / test_packaging.sh).
  # Builds the full glibc feature set, so it is heavy and stands on its own. This
  # mirrors the release workflow's `packages` job; keeping it on every push catches
  # a broken Cargo.toml asset path or dependency policy here, not at tag time.
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build binary + generate man page / completions
        run: |
          cargo build --locked --release
          mkdir -p dist-assets
          ./target/release/keyhole gen man --out dist-assets
          for sh in bash zsh fish; do
            ./target/release/keyhole gen completions "$sh" --out dist-assets
          done

      - name: Install cargo-deb + cargo-generate-rpm
        run: cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build the .deb and .rpm
        run: |
          # cargo-deb's $auto depends shells out to dpkg-shlibdeps (dpkg-dev);
          # preinstalled on the runner, but make the dependency explicit.
          command -v dpkg-shlibdeps >/dev/null || { sudo apt-get update && sudo apt-get install -y dpkg-dev; }
          cargo deb --no-build --no-strip
          cargo generate-rpm
          ls -l target/debian/*.deb target/generate-rpm/*.rpm

      - name: Install + smoke-test the .deb (Debian/Ubuntu, native)
        run: |
          sudo apt-get update
          sudo apt-get install -y ./target/debian/*.deb
          keyhole --version
          # man-db is preinstalled on the runner; confirm the page resolves.
          man -w keyhole
          echo "== dpkg dependency declarations =="
          dpkg -s keyhole | grep -E '^(Depends|Recommends):'

      - name: Install + smoke-test the .rpm (Fedora container)
        run: |
          docker run --rm -v "$PWD/target/generate-rpm:/pkg:ro" fedora:latest bash -c '
            set -euo pipefail
            dnf install -y /pkg/*.rpm
            keyhole --version
            # Fedora images default to tsflags=nodocs; the man page + licenses are
            # deliberately not %doc, so they must still be present.
            test -f /usr/share/licenses/keyhole/LICENSE-MIT
            test -f /usr/share/licenses/keyhole/LICENSE-APACHE
            dnf install -y man-db
            man -w keyhole
            echo "== rpm dependency declarations =="
            rpm -q --requires --recommends keyhole
          '

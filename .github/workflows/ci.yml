name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test

      - name: Install redis-cli
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Enable keyspace notifications
        # The keyspace-monitor integration test needs server-side notifications.
        run: redis-cli -h 127.0.0.1 -p 6379 config set notify-keyspace-events KEA

      - name: Integration tests
        env:
          BROKERTUI_TEST_REDIS_PORT: "6379"
        run: cargo test --features integration -- --include-ignored

  # Headless, statically-linked build (env-var secrets only; no keyring backend).
  musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Clippy (headless feature set)
        run: cargo clippy --no-default-features --all-targets -- -D warnings

      - name: Build static musl binary
        run: cargo build --release --no-default-features --target x86_64-unknown-linux-musl

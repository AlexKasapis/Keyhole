# Release automation: on a `vX.Y.Z` tag push, cut a GitHub Release with notes
# pulled from CHANGELOG.md and upload, for every supported Linux target:
#   * a `.tar.gz` (binary + man page + completions + LICENSEs + README/CHANGELOG)
#   * a `.sha256` checksum next to it
#   * a cosign keyless signature pair (`.sig` + `.pem`)
# plus, once per release:
#   * the `keyhole-installer.sh` curl|sh installer (shared by all targets)
#   * `SHA256SUMS` — one aggregate checksum file over every artifact (signed)
#   * `keyhole.cdx.json` — a CycloneDX SBOM (signed)
#   * SLSA build-provenance attestations for the binaries (gh attestation verify)
#
# Nothing publishes until the `verify` gate (fmt/clippy/tests) is green.
#
# Feature policy (see the README "Build variants" table): the glibc (`gnu`)
# targets carry the full default feature set (keyring + AMQP + RabbitMQ); the
# static `musl` targets are `--no-default-features` (Redis only, no D-Bus / TLS),
# which is why this matrix sets features per-target rather than globally.
#
# ci.yml stays the test/lint gate; this workflow only runs on release tags.
name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

# Don't let two pushes of the same tag race on the release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Release gate: a tag must never publish a binary that fails fmt/clippy/tests.
  # This runs the fast unit + snapshot suite (default feature set: keyring + amqp
  # + rabbitmq); the full broker-backed integration suite gates the same commit
  # via ci.yml, which also fires on the tag push. `cargo test` deliberately omits
  # `--all-features`: that would enable the `integration` feature and run the
  # broker tests with no brokers present. Everything below `needs: [verify]`.
  verify:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Tests (fast unit + snapshot suite)
        run: cargo test --locked

  # Create the GitHub Release (notes from CHANGELOG.md) and attach the
  # version-independent installer script. Fast, so it gates the rest.
  create-release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1.11.0
        with:
          # Extracts the section matching the tag's version as the release body.
          changelog: CHANGELOG.md
          # Prerelease tags (e.g. v0.1.0-rc.1) won't have a CHANGELOG stanza yet;
          # still cut the release so the artifact pipeline can be smoke-tested.
          allow-missing-changelog: true
          title: "Keyhole $version"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer script
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp scripts/install.sh keyhole-installer.sh
          gh release upload "${GITHUB_REF_NAME}" keyhole-installer.sh --clobber

  # Generate the man page + shell completions once from a host build (they are
  # target-independent), and share them with every packaging job. Built with
  # --no-default-features purely for speed — `keyhole gen` introspects the clap
  # definition, which is identical regardless of the broker feature flags.
  assets:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build (headless feature set, for `gen` only)
        run: cargo build --locked --release --no-default-features

      - name: Generate man page and completions
        run: |
          mkdir -p dist-assets
          ./target/release/keyhole gen man --out dist-assets
          ./target/release/keyhole gen completions bash --out dist-assets
          ./target/release/keyhole gen completions zsh  --out dist-assets
          ./target/release/keyhole gen completions fish --out dist-assets
          ls -l dist-assets

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: packaging-assets
          path: dist-assets/
          if-no-files-found: error

      # CycloneDX SBOM of the dependency graph. Generated with --all-features, so
      # it describes the full glibc build (the superset); the static musl build
      # is a strict subset of these crates. Shared with the `sign` job, which
      # publishes and signs it.
      - name: Generate SBOM (CycloneDX)
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --all-features

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: keyhole.cdx.json
          if-no-files-found: error

  # Cross-compile and upload one tarball + checksum per target.
  upload-binaries:
    needs: [create-release, assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc — full default features (keyring + amqp + rabbitmq).
          - target: x86_64-unknown-linux-gnu
            no_default_features: false
          - target: aarch64-unknown-linux-gnu
            no_default_features: false
          # musl — static, dependency-free, Redis-only (no keyring/amqp/rabbitmq).
          - target: x86_64-unknown-linux-musl
            no_default_features: true
          - target: aarch64-unknown-linux-musl
            no_default_features: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Download generated man page + completions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: packaging-assets
          path: dist-assets

      - uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          bin: keyhole
          target: ${{ matrix.target }}
          no-default-features: ${{ matrix.no_default_features }}
          # cross-compilation handled by `cross` automatically; pin a reproducible build.
          locked: true
          checksum: sha256
          leading-dir: true
          # Bundle docs/licenses alongside the binary (glob/dir not supported —
          # list each file; folded into a whitespace-separated list). Reused by
          # the .deb/.rpm/AUR/Homebrew packaging in later tiers.
          include: >-
            dist-assets/keyhole.1
            dist-assets/keyhole.bash
            dist-assets/_keyhole
            dist-assets/keyhole.fish
            LICENSE-MIT
            LICENSE-APACHE
            README.md
            CHANGELOG.md
          ref: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Tier 3 — distro-native packages. Build the full-feature glibc `.deb` (apt)
  # and `.rpm` (zypper/dnf) for x86_64 and upload them to the release, so
  # Debian/Ubuntu and openSUSE/Fedora users can `apt|zypper|dnf install ./keyhole…`
  # straight from a file without waiting on official-repo inclusion. The feature
  # set, dependency declarations, and install layout live in `[package.metadata.deb]`
  # / `[package.metadata.generate-rpm]` in Cargo.toml.
  #
  # Built natively (not cross-compiled) on purpose: cargo-deb's dpkg-shlibdeps and
  # cargo-generate-rpm's builtin ELF dependency scan then pin the exact glibc
  # floor of the build toolchain. x86_64 only — these target normal desktop /
  # session-bus systems; aarch64 and everything else use the static musl tarball
  # or `cargo install`. Adding aarch64 means a native `ubuntu-24.04-arm` matrix
  # leg: a cross-built package would carry a wrong/loose dependency floor.
  packages:
    needs: [create-release, assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Download generated man page + completions
        # The same artifact the tarballs bundle; Cargo.toml's package assets read
        # it from ./dist-assets (alongside the binary in ./target/release).
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: packaging-assets
          path: dist-assets

      - name: Build the full-feature glibc binary
        # Default features (keyring + amqp + rabbitmq); the release profile strips
        # it, so the packagers below run with --no-strip.
        run: cargo build --locked --release

      - name: Install cargo-deb + cargo-generate-rpm
        # `cargo install` rather than a prebuilt-binary action so the step never
        # depends on a third party publishing a build for these two packagers.
        run: cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build the .deb and .rpm
        run: |
          # cargo-deb's $auto depends shells out to dpkg-shlibdeps (dpkg-dev);
          # preinstalled on the runner, but make the dependency explicit.
          command -v dpkg-shlibdeps >/dev/null || { sudo apt-get update && sudo apt-get install -y dpkg-dev; }
          cargo deb --no-build --no-strip
          cargo generate-rpm
          {
            echo '## Distro packages'
            echo '```'
            ls -l target/debian/*.deb target/generate-rpm/*.rpm
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload the .deb and .rpm to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber \
            target/debian/*.deb target/generate-rpm/*.rpm

  # Integrity layer: once every binary tarball, the distro packages, and the SBOM
  # are on the release, attach the verifiable extras. Adds, to the release:
  #   * SHA256SUMS ............. one aggregate checksum over all artifacts
  #   * keyhole.cdx.json ....... the CycloneDX SBOM
  #   * <artifact>.sig/.pem .... cosign keyless (sigstore) signatures
  # and records SLSA build-provenance attestations for the binaries + packages
  # (verifiable with `gh attestation verify <file> --repo AlexKasapis/Keyhole`).
  # The installer (scripts/install.sh) verifies the cosign signature when available.
  sign:
    needs: [create-release, assets, upload-binaries, packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload signatures / checksums / SBOM to the release
      id-token: write # OIDC for cosign keyless signing + provenance
      attestations: write # record build-provenance attestations
    steps:
      - name: Download the SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom
          path: artifacts

      - name: Download the release tarballs + distro packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd artifacts
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --pattern '*.tar.gz' --pattern '*.deb' --pattern '*.rpm'
          ls -l

      - name: Generate aggregate SHA256SUMS
        working-directory: artifacts
        run: |
          sha256sum ./*.tar.gz ./*.deb ./*.rpm keyhole.cdx.json > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artifacts (cosign keyless)
        working-directory: artifacts
        run: |
          for f in ./*.tar.gz ./*.deb ./*.rpm SHA256SUMS keyhole.cdx.json; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          ls -l

      - name: Attest build provenance for the binaries + packages
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/*.rpm

      - name: Upload signatures, checksums, and SBOM to the release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: artifacts
        run: |
          gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber \
            SHA256SUMS keyhole.cdx.json ./*.sig ./*.pem

  # Tier 2 — community packaging metadata. Fill the real release version and
  # tarball checksums into the AUR PKGBUILDs (+ .SRCINFO) and the Homebrew formula
  # (committed with placeholders), then attach them to the release as the
  # ready-to-publish inputs. Pushing them to the AUR git remotes / the
  # homebrew-tap repo is a manual follow-up — see packaging/README.md.
  package-metadata:
    needs: [create-release, upload-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fill version + checksums into the packaging artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          tmp="$(mktemp -d)"

          # The two glibc release tarballs uploaded by upload-binaries; their
          # checksums are what `keyhole-bin` and the Homebrew formula verify.
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir "$tmp" \
            --pattern 'keyhole-x86_64-unknown-linux-gnu.tar.gz' \
            --pattern 'keyhole-aarch64-unknown-linux-gnu.tar.gz'
          sha_x86="$(sha256sum "$tmp/keyhole-x86_64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)"
          sha_arm="$(sha256sum "$tmp/keyhole-aarch64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)"

          # The GitHub-generated source-tag tarball, for the from-source AUR pkg.
          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${tag}.tar.gz" \
            -o "$tmp/source.tar.gz"
          sha_src="$(sha256sum "$tmp/source.tar.gz" | cut -d' ' -f1)"

          ./scripts/gen_packaging.sh release \
            --version "$version" \
            --sha-x86_64 "$sha_x86" \
            --sha-aarch64 "$sha_arm" \
            --sha-src "$sha_src"

      - name: Sanity-check the filled artifacts
        # The full scripts/test_packaging.sh asserts version consistency against
        # Cargo.toml, which a prerelease (rc) tag deliberately diverges from; here
        # just confirm the generated files are still well-formed.
        run: |
          bash -n packaging/aur/keyhole/PKGBUILD
          bash -n packaging/aur/keyhole-bin/PKGBUILD
          ruby -c packaging/homebrew/keyhole.rb

      - name: Stage and upload packaging assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          out="$(mktemp -d)"
          cp packaging/aur/keyhole-bin/PKGBUILD "$out/keyhole-bin.PKGBUILD"
          cp packaging/aur/keyhole-bin/.SRCINFO "$out/keyhole-bin.SRCINFO"
          cp packaging/aur/keyhole/PKGBUILD "$out/keyhole.PKGBUILD"
          cp packaging/aur/keyhole/.SRCINFO "$out/keyhole.SRCINFO"
          cp packaging/homebrew/keyhole.rb "$out/keyhole.rb"
          gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber \
            "$out/keyhole-bin.PKGBUILD" "$out/keyhole-bin.SRCINFO" \
            "$out/keyhole.PKGBUILD" "$out/keyhole.SRCINFO" "$out/keyhole.rb"

# Scheduled RUSTSEC advisory scan.
#
# ci.yml runs the full `cargo deny check` on every push/PR, but that only catches
# advisories at commit time. A vulnerability disclosed against a dependency we
# already ship would otherwise go unnoticed until the next commit. This job
# re-runs the advisory check daily (and on demand) against the committed
# Cargo.lock, so a fresh CVE surfaces as a failed run even on a quiet repo.
name: Audit

on:
  schedule:
    # 06:00 UTC daily.
    - cron: "0 6 * * *"
  workflow_dispatch:
  # Re-scan immediately when the dependency graph or the policy changes.
  push:
    paths:
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"

jobs:
  advisories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check advisories

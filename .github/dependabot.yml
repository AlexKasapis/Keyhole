# Dependabot keeps two graphs current: the Cargo dependency tree and the GitHub
# Actions pinned by commit SHA in the workflows. The actions updater is what lets
# us pin actions to immutable SHAs (supply-chain hardening) without them going
# stale — Dependabot bumps the SHA and updates the trailing version comment.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Batch the routine minor/patch churn into one PR to cut review noise; let
    # major bumps come through individually so they get a deliberate look.
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      github-actions:
        update-types:
          - minor
          - patch

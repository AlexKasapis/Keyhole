# Configuration for cargo-release (https://github.com/crate-ci/cargo-release).
#
#   just release            # preview (cargo-release is dry-run by default)
#   just release patch -x   # actually bump, changelog, commit, tag, push
#
# `cargo release <level> -x` bumps the version, rewrites CHANGELOG.md and the
# community packaging artifacts (below), commits, creates the `vX.Y.Z` tag, and
# pushes it. The tag push triggers .github/workflows/release.yml, which builds
# and publishes the GitHub Release.
#
# Publishing to crates.io is intentionally left OFF here (`publish = false`):
# it's the separate, irreversible Tier-1a step (`cargo publish`), kept out of
# the tag→GitHub-Release flow so a release never accidentally pushes a crate.
# Flip `publish` to true to fold crates.io publishing into the same command.

allow-branch = ["main"]
publish = false
tag-name = "v{{version}}"
tag-message = "Keyhole {{version}}"
pre-release-commit-message = "Release {{version}}"

# After the version bump + replacements below have rewritten the PKGBUILD/formula
# version lines, regenerate the AUR .SRCINFO files from the freshly bumped
# PKGBUILDs so the two can never drift. cargo-release runs hooks on a dry run too
# (with DRY_RUN=true), where nothing was actually rewritten — skip there so a
# `just release` preview leaves the work tree clean. The release commit is a
# `git commit -am`, so the regenerated .SRCINFO get swept in alongside the
# replacements.
pre-release-hook = ["sh", "-c", '[ "$DRY_RUN" = true ] || "$WORKSPACE_ROOT/scripts/gen_packaging.sh" srcinfo']

# Move the "Unreleased" heading down to a dated, versioned section.
[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "## \\[Unreleased\\]"
replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}"
exactly = 1

# Re-point the bottom-of-file compare links: "Unreleased" now compares against
# the new tag, and a fresh link is added for the released version.
[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "\\[Unreleased\\]: https://github.com/AlexKasapis/Keyhole/compare/v[0-9.]+\\.\\.\\.HEAD"
replace = "[Unreleased]: https://github.com/AlexKasapis/Keyhole/compare/v{{version}}...HEAD\n[{{version}}]: https://github.com/AlexKasapis/Keyhole/compare/v{{prev_version}}...v{{version}}"
exactly = 1

# Keep the community packaging artifacts (AUR PKGBUILDs + Homebrew formula) on
# the released version, so a release never reintroduces the Cargo-vs-packaging
# version drift that scripts/test_packaging.sh enforces against. Only the version
# line in each needs rewriting: the PKGBUILD source URLs derive from $pkgver and
# the Homebrew URLs from #{version}, and the pre-release-hook above regenerates
# the .SRCINFO files. The sha256 checksums deliberately stay as their committed
# placeholders ('SKIP' / zero-hashes) and are filled in afterwards by the release
# workflow's package-metadata job, once the tagged build's tarballs exist.
[[pre-release-replacements]]
file = "packaging/aur/keyhole/PKGBUILD"
search = "^pkgver=.*"
replace = "pkgver={{version}}"
exactly = 1

[[pre-release-replacements]]
file = "packaging/aur/keyhole-bin/PKGBUILD"
search = "^pkgver=.*"
replace = "pkgver={{version}}"
exactly = 1

[[pre-release-replacements]]
file = "packaging/homebrew/keyhole.rb"
search = '^  version ".*"'
replace = '  version "{{version}}"'
exactly = 1

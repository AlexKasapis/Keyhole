# Local brokers for development & integration tests.
#   docker compose up -d redis activemq   # Redis + ActiveMQ (AMQP 1.0)
#   docker compose --profile rabbitmq up -d  # also start RabbitMQ (AMQP 0-9-1, future)
#
# Host ports are configurable to avoid clashes with an existing local stack.
# Override in a (gitignored) .env file, e.g. BROKERTUI_REDIS_PORT=6380.
services:
  redis:
    image: redis:7-alpine
    # Keyspace notifications enabled for the Phase 3 keyspace monitor.
    command: ["redis-server", "--notify-keyspace-events", "KEA"]
    ports:
      - "${BROKERTUI_REDIS_PORT:-6379}:6379"

  # Apache ActiveMQ Classic — the Phase 4 AMQP 1.0 target (matches AWS Amazon MQ
  # for ActiveMQ). Default credentials are admin/admin; AMQP is on 5672.
  activemq:
    image: apache/activemq-classic:latest
    ports:
      - "${BROKERTUI_ACTIVEMQ_PORT:-5674}:5672"  # AMQP 1.0
      - "${BROKERTUI_ACTIVEMQ_WEB_PORT:-8162}:8161" # web console

  # AMQP 0-9-1 broker — a planned later addition (the trait abstracts the broker,
  # so a RabbitMQ/lapin or AMQP-1.0-against-RabbitMQ-4.x impl can slot in).
  rabbitmq:
    image: rabbitmq:3-management
    profiles: ["rabbitmq"]
    ports:
      - "${BROKERTUI_RABBITMQ_PORT:-5673}:5672"      # AMQP
      - "${BROKERTUI_RABBITMQ_MGMT_PORT:-15673}:15672" # management UI / HTTP API

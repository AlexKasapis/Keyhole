# Dev config for the dockerized broker stack (see docker-compose.yml).
#
#   just dev                                   # brokers up, seed, publish (Ctrl-C to stop)
#   export KEYHOLE_DEV_RABBITMQ_PASSWORD=keyhole
#   keyhole --config config.dev.toml --connect dev-redis
#
# Ports are the docker-compose HOST ports, not Keyhole's 5672 defaults.
# RabbitMQ tap target (type it in the TUI): exchange:keyhole.demo
#                                       or  exchange:keyhole.demo/order.*

[[connection]]
type = "redis"
name = "dev-redis"
host = "127.0.0.1"
port = 6379

[[connection]]
type = "amqp"
name = "dev-activemq"
host = "127.0.0.1"
port = 5674
# ActiveMQ accepts SASL ANONYMOUS by default — no credentials needed.
# These destinations must match what `keyhole dev publish` emits.
destinations = ["topic:keyhole.demo.events", "queue:keyhole.demo.orders"]
# Optional: enrich the curated list above by enumerating the broker's own
# topics/queues over the ActiveMQ web console's Jolokia API (default :8161).
# AMQP 1.0 can't enumerate destinations, so this is a separate HTTP channel.
# The console requires HTTP Basic auth (default admin/admin); the password is a
# secret spec (env:/keyring:, no literal), so export it first, e.g.
#   set -x KEYHOLE_ACTIVEMQ_PW admin
# Uncomment to enable auto-discovery on connect (and the 'r' key to refresh):
# management_url = "http://127.0.0.1:8161"
# management_username = "admin"
# management_password = "env:KEYHOLE_ACTIVEMQ_PW"

[[connection]]
type = "rabbitmq"
name = "dev-rabbitmq"
host = "127.0.0.1"
port = 5673
vhost = "/"
username = "keyhole"
# A secret spec, not a literal: export KEYHOLE_DEV_RABBITMQ_PASSWORD=keyhole
# (the `just dev` recipe sets it for the publisher inline).
password = "env:KEYHOLE_DEV_RABBITMQ_PASSWORD"
